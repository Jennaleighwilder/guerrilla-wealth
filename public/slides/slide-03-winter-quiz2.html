<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guerrilla Wealth — Layer II: Wealth Geography (Winter)</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#080610;--deep:#0e0b18;--smoke:#1a1528;--ridge:#2a2240;
  --copper:#d4863e;--ember:#e8a95b;--fire:#c45a3a;--gold:#f0c060;
  --jade:#3a9a7a;--river:#4a9fa2;
  --cream:#f5f0e8;--dim:#7a7288;--fog:#a89ab8;
  --glow:rgba(212,134,62,0.15);
  /* Winter accents */
  --ice:#b8d4e8;--frost:#8ab0cc;--steel:#5a7a8a;--berry:#8a2a3a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--void);color:var(--cream);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ WINTER AURORA — cold blue, silver, faint berry ═══ */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 40%,rgba(138,176,204,0.07),transparent 55%),
    radial-gradient(ellipse 70% 40% at 20% 70%,rgba(90,122,138,0.08),transparent 50%),
    radial-gradient(ellipse 40% 50% at 80% 60%,rgba(138,42,58,0.04),transparent 50%),
    radial-gradient(ellipse 50% 30% at 60% 20%,rgba(184,212,232,0.05),transparent 50%);
  animation:auroraShift 30s ease-in-out infinite alternate;}
@keyframes auroraShift{0%{opacity:.5;filter:hue-rotate(0deg)}50%{opacity:.85;filter:hue-rotate(-5deg)}100%{opacity:.6;filter:hue-rotate(3deg)}}

/* ═══ RED MOON — BIG ═══ */
.moon{position:fixed;top:5vh;right:8vw;width:150px;height:150px;z-index:1;pointer-events:none;}
.moon-body{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 36%,#e04040,#c42a2a,#8a1a1a,#5a0a0a);
  box-shadow:
    0 0 55px rgba(200,40,40,0.4),
    0 0 110px rgba(180,30,30,0.2),
    0 0 220px rgba(138,26,26,0.12),
    inset -8px -5px 16px rgba(0,0,0,0.3);
  animation:moonGlow 6s ease-in-out infinite;
  position:relative;overflow:hidden;}
.moon-body::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,transparent 25%,rgba(255,120,100,0.2) 40%,transparent 50%,rgba(255,80,60,0.1) 65%,transparent 75%);
  animation:moonShimmer 10s ease-in-out infinite;}
.moon-body::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 55% 50%,transparent 35%,rgba(90,10,10,0.15) 55%,rgba(60,5,5,0.1) 75%);}
.moon-halo{position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(200,40,40,0.1);animation:ringFloat 7s ease-in-out infinite;}
.moon-halo2{position:absolute;inset:-42px;border-radius:50%;border:1px solid rgba(200,40,40,0.05);animation:ringFloat 9s ease-in-out infinite 1.5s;}
@keyframes moonGlow{0%,100%{box-shadow:0 0 55px rgba(200,40,40,0.4),0 0 110px rgba(180,30,30,0.2),0 0 220px rgba(138,26,26,0.12),inset -8px -5px 16px rgba(0,0,0,0.3)}50%{box-shadow:0 0 75px rgba(200,40,40,0.5),0 0 150px rgba(180,30,30,0.3),0 0 260px rgba(138,26,26,0.16),inset -8px -5px 16px rgba(0,0,0,0.25)}}
@keyframes moonShimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes ringFloat{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.55;transform:scale(1.02)}}

/* ═══ MOUNTAINS (icy) ═══ */
.mtn{position:fixed;bottom:0;left:0;width:100%;z-index:1;pointer-events:none;opacity:0.07;color:var(--ice);}
.mtn svg{width:100%;height:110px;display:block;}

.sea{position:fixed;bottom:1rem;right:1rem;font-family:'Inter',system-ui,sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--frost);opacity:.3;z-index:50;pointer-events:none;}

.prog{position:fixed;top:0;left:0;width:100%;height:4px;z-index:200;background:rgba(255,255,255,.06);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--steel),var(--frost),var(--ice));transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0;}

.content{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;}

.sec-intro{max-width:600px;margin:0 auto;padding:4rem 2rem 3rem;text-align:center;animation:fadeUp .8s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.sec-icon{font-size:2.8rem;margin-bottom:1rem;filter:drop-shadow(0 0 12px rgba(138,176,204,.3));}
.sec-num{font-family:'Inter',system-ui,sans-serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--frost);margin-bottom:.5rem;}
.sec-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,4vw,2.2rem);margin-bottom:.6rem;}
.sec-desc{font-family:'Inter',system-ui,sans-serif;font-size:1.1rem;font-weight:400;color:var(--fog);line-height:1.65;margin-bottom:2rem;max-width:480px;margin-left:auto;margin-right:auto;}

.qc{max-width:640px;margin:0 auto;padding:2rem 1.5rem 4rem;display:none;}
.qc.on{display:block;animation:fadeUp .5s ease-out;}
.qc-ct{font-family:'Inter',system-ui,sans-serif;font-size:.62rem;letter-spacing:.15em;color:#b0a8b8;margin-bottom:1.2rem;text-align:center;}
.qc-t{font-family:'Cinzel',serif;font-size:clamp(1.35rem,4vw,1.75rem);font-weight:600;text-align:center;line-height:1.35;margin-bottom:.6rem;}
.qc-sub{font-family:'Inter',system-ui,sans-serif;font-size:1.05rem;font-weight:400;color:#b0a8b8;text-align:center;margin-bottom:2rem;line-height:1.5;}

.opts{display:flex;flex-direction:column;gap:.6rem;}
.opt{padding:1.1rem 1.3rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:10px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(8px);display:flex;align-items:flex-start;gap:.9rem;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.opt::before{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transition:left .6s;pointer-events:none;}
.opt:hover{border-color:rgba(138,176,204,.3);background:rgba(138,176,204,.06);transform:translateX(6px);}
.opt:hover::before{left:100%;}
.opt.sel{border-color:rgba(138,176,204,.5);background:rgba(138,176,204,.08);box-shadow:0 0 20px rgba(138,176,204,.08);}
.opt-ic{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;margin-top:.05rem;transition:all .3s;}
.opt.sel .opt-ic{background:rgba(138,176,204,.15);}
.opt-body{flex:1;}
.opt-t{font-family:'Inter',system-ui,sans-serif;font-weight:600;font-size:1.05rem;}
.opt-d{font-family:'Inter',system-ui,sans-serif;font-size:.95rem;color:#b0a8b8;margin-top:.2rem;line-height:1.45;}

/* Textarea (winter frost border) */
.q-ta{width:100%;padding:1.1rem;background:rgba(255,255,255,.14);border:1px solid rgba(138,176,204,.15);border-radius:8px;color:var(--cream);font-family:'Inter',system-ui,sans-serif;font-size:1.1rem;outline:none;resize:none;transition:border-color .3s;min-height:90px;}
.q-ta:focus{border-color:rgba(138,176,204,.4);box-shadow:0 0 15px rgba(138,176,204,.06);}
.q-ta::placeholder{color:#b0a8b8;font-style:italic;}

/* Slider (winter colors) */
.sl-wrap{padding:.5rem 0;}
.sl{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--steel),var(--frost),var(--berry));outline:none;margin:1rem 0;}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:var(--cream);border:3px solid var(--frost);cursor:pointer;box-shadow:0 0 15px rgba(138,176,204,.3);}
.sl-labels{display:flex;justify-content:space-between;}
.sl-labels span{font-family:'Inter',system-ui,sans-serif;font-size:.85rem;color:#b0a8b8;}
.sl-fb{margin-top:1.2rem;padding:1rem;background:rgba(255,255,255,.07);border:1px solid rgba(138,176,204,.08);border-left:3px solid var(--frost);border-radius:0 8px 8px 0;font-family:'Inter',system-ui,sans-serif;font-size:.95rem;color:var(--fog);line-height:1.5;backdrop-filter:blur(8px);}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2.5rem;padding:0 .5rem;}
.btn-back{background:none;border:none;color:#b0a8b8;font-family:'Inter',system-ui,sans-serif;font-size:.75rem;cursor:pointer;letter-spacing:.06em;transition:color .2s;-webkit-tap-highlight-color:transparent;}
.btn-back:hover{color:var(--cream);}
.btn-next{padding:12px 32px;background:rgba(138,176,204,.12);border:1px solid rgba(138,176,204,.25);color:var(--ice);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent;}
.btn-next:hover{background:rgba(138,176,204,.22);transform:translateY(-2px);}
.btn-begin{padding:14px 40px;background:rgba(138,176,204,.12);border:1px solid rgba(138,176,204,.25);color:var(--ice);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent;}
.btn-begin:hover{background:rgba(138,176,204,.22);transform:translateY(-2px);}

@media(max-width:600px){.opts{gap:.5rem;}.opt{padding:.9rem 1rem;}.moon{width:100px;height:100px;top:3vh;right:5vw;}}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="aurora"></div>

<!-- ═══ RED BLOOD MOON ═══ -->
<div class="moon">
  <div class="moon-body"></div>
  <div class="moon-halo"></div>
  <div class="moon-halo2"></div>
</div>

<div class="mtn"><svg viewBox="0 0 1440 120" preserveAspectRatio="none" fill="currentColor"><path d="M0,120 L0,90 C140,70 220,40 360,52 C500,64 560,82 680,55 C800,28 880,45 1000,38 C1120,31 1200,52 1320,42 C1390,36 1420,46 1440,44 L1440,120Z"/></svg></div>
<div class="sea">✦ winter · layer ii</div>
<div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>

<div class="content" id="content"></div>

<script>
// ═══ WINTER PARTICLES — snowflakes + ice mist ═══
const cv=document.getElementById('particles'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);

let particles=[];

// Snowflakes (60)
for(let i=0;i<60;i++){
  particles.push({
    type:'snow',x:Math.random()*3000,y:-20-Math.random()*800,
    size:1+Math.random()*3.5,
    vy:.2+Math.random()*.5,vx:(Math.random()-.5)*.3,
    drift:Math.random()*Math.PI*2,driftSpeed:.003+Math.random()*.008,
    alpha:.15+Math.random()*.5,
    twinkle:Math.random()*Math.PI*2
  });
}

// Ice crystals (20)
for(let i=0;i<20;i++){
  particles.push({
    type:'crystal',x:Math.random()*3000,y:-10-Math.random()*400,
    size:.5+Math.random()*1.5,
    vy:.1+Math.random()*.2,vx:(Math.random()-.5)*.1,
    phase:Math.random()*Math.PI*2,
    alpha:.2+Math.random()*.4
  });
}

// Cold mist (drifting)
for(let i=0;i<8;i++){
  particles.push({
    type:'mist',x:Math.random()*3000,y:Math.random()*3000,
    size:5+Math.random()*8,vx:.03+Math.random()*.06,
    phase:Math.random()*Math.PI*2,
    alpha:.04+Math.random()*.08,life:0
  });
}

function drawSnowflake(x,y,size,alpha,twinkle){
  cx.save();
  cx.translate(x,y);
  cx.globalAlpha=alpha*(0.7+Math.sin(twinkle)*0.3);
  cx.fillStyle='#e8eef4';
  cx.beginPath();cx.arc(0,0,size,0,Math.PI*2);cx.fill();
  // Glow
  cx.globalAlpha=alpha*0.15;
  cx.beginPath();cx.arc(0,0,size*3,0,Math.PI*2);cx.fill();
  cx.restore();
}

function animate(){
  cx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    if(p.type==='snow'){
      p.drift+=p.driftSpeed;
      p.twinkle+=.03;
      p.x+=p.vx+Math.sin(p.drift)*.5;
      p.y+=p.vy;
      if(p.y>H+30){p.y=-30;p.x=Math.random()*W;}
      if(p.x<-30)p.x=W+30;if(p.x>W+30)p.x=-30;
      drawSnowflake(p.x,p.y,p.size,p.alpha,p.twinkle);
    }else if(p.type==='crystal'){
      p.phase+=.015;
      p.x+=p.vx+Math.sin(p.phase)*.1;
      p.y+=p.vy;
      if(p.y>H+10){p.y=-10;p.x=Math.random()*W;}
      cx.globalAlpha=p.alpha*(0.6+Math.sin(p.phase*2)*.4);
      cx.fillStyle='#b8d4e8';
      cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }else if(p.type==='mist'){
      p.life+=.002;
      p.x+=p.vx;p.y+=Math.sin(p.life*1.5+p.phase)*.2;
      if(p.x>W+50){p.x=-50;p.y=Math.random()*H;}
      cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);
      cx.fillStyle='rgba(138,176,204,'+p.alpha+')';cx.fill();
    }
  });
  requestAnimationFrame(animate);
}
animate();

// ═══ BOLDNESS SLIDER FEEDBACK ═══
const BOLD_FB=[
  '','Level 1 — Ghost mode. You watch from the edges. We start with stickers and silent drops. No face needed.',
  'Level 2 — You\'ll show up but not speak first. We build with QR codes, business cards at counters, and online-first funnels.',
  'Level 3 — Comfortable one-on-one. We route you to partnership conversations and private readings. No crowds.',
  'Level 4 — You can approach people if there\'s a reason. Event attendance with a specific mission works for you.',
  'Level 5 — Middle ground. Flash readings at a table, booth work, targeted conversations. You pick your moments.',
  'Level 6 — Leaning outward. You\'ll pitch partnerships, do pop-ups, approach strangers with a script.',
  'Level 7 — You\'ll work a room if it\'s your kind of room. We book you into the right events and let you run.',
  'Level 8 — Assertive. Cold approaches, live demonstrations, vendor booths. You bring the energy.',
  'Level 9 — Performer. You want stages, drum circles, market corners. Give you a crowd and watch.',
  'Level 10 — Full spectacle. Street presence, installations, spectacle marketing. You ARE the event.'
];

// ═══ QUIZ ENGINE ═══
const QS=[
  {id:'city_feel',ct:'LAYER II · QUESTION 1 OF 5',
   t:'Describe your city in one gut feeling.',
   sub:'Not facts. Not demographics. The feeling in your chest when you drive through.',
   type:'text',placeholder:'The truth your body knows about this place...'},
  {id:'revenue',ct:'LAYER II · QUESTION 2 OF 5',
   t:'What\'s your monthly revenue target?',
   sub:'The honest number. Not the dream — the one that lets you breathe.',
   type:'select',
   opts:[
     {ic:'🌱',lbl:'$500 – $1,000/mo',d:'Survival mode — need to cover basics first'},
     {ic:'🔥',lbl:'$1,000 – $2,500/mo',d:'Breathing room — bills covered plus some freedom'},
     {ic:'⚡',lbl:'$2,500 – $5,000/mo',d:'Real income — this becomes a legitimate business'},
     {ic:'🚀',lbl:'$5,000 – $10,000/mo',d:'Thriving — growth mode, team possible, investing back in'},
     {ic:'👑',lbl:'$10,000+/mo',d:'Empire building — multiple streams, scaling everything'}
   ]},
  {id:'boldness',ct:'LAYER II · QUESTION 3 OF 5',
   t:'How bold are you willing to be?',
   sub:'1 = invisible. 10 = you\'ll stand on a table and make an announcement. Be honest.',
   type:'slider'},
  {id:'client_quote',ct:'LAYER II · QUESTION 4 OF 5',
   t:'Quote what clients say about you — their words, not yours.',
   sub:'This becomes your marketing copy. The words that sell you are already being spoken.',
   type:'text',placeholder:'Write exactly what they say, in their voice...'},
  {id:'nervous_clients',ct:'LAYER II · QUESTION 5 OF 5',
   t:'Which clients make you nervous?',
   sub:'The answer predicts your ceiling. We\'re going to raise it.',
   type:'select',
   opts:[
     {ic:'💰',lbl:'Wealthy clients',d:'Money intimidates — you underprice for them'},
     {ic:'🎓',lbl:'Educated/credentialed clients',d:'Imposter syndrome triggers around degrees'},
     {ic:'😤',lbl:'Skeptics and cynics',d:'You need believers or you shrink'},
     {ic:'👔',lbl:'Business owners / professionals',d:'You feel "less than" in their world'},
     {ic:'🪞',lbl:'People who remind you of yourself',d:'Mirror reflection makes you uncomfortable'},
     {ic:'✨',lbl:'None — I\'m comfortable with everyone',d:'Your ceiling isn\'t about the client. It\'s about something else.'}
   ]}
];

let cur=-1;const ans={};let boldVal=5;

function renderIntro(){
  const c=document.getElementById('content');
  c.style.display='flex';c.style.alignItems='center';c.style.justifyContent='center';
  c.innerHTML=`
    <div class="sec-intro">
      
      <div class="sec-num">Layer II of III</div>
      <div class="sec-title">Wealth Geography & Reality Map</div>
      <div class="sec-desc">Winter strips the landscape bare. No leaves to hide behind. Now we see the bones of your business — the numbers, the territory, the honest truth of where you stand.</div>
      <button class="btn-begin" onclick="next()">Face the Numbers →</button>
    </div>`;
  document.getElementById('prog').style.width='0%';
}

function renderQ(i){
  const c=document.getElementById('content');
  c.style.display='block';c.style.alignItems='';c.style.justifyContent='';
  const q=QS[i];
  document.getElementById('prog').style.width=Math.round(((i+1)/QS.length)*100)+'%';
  let h=`<div class="qc on"><div class="qc-ct">${q.ct}</div><div class="qc-t">${q.t}</div><div class="qc-sub">${q.sub}</div>`;

  if(q.type==='text'){
    const v=ans[q.id]||'';
    h+=`<textarea class="q-ta" placeholder="${q.placeholder}" oninput="ans['${q.id}']=this.value" rows="4">${v}</textarea>`;
  }else if(q.type==='slider'){
    h+=`<div class="sl-wrap">
      <input type="range" class="sl" min="1" max="10" value="${boldVal}" oninput="updateBold(this.value)">
      <div class="sl-labels"><span>1 — Ghost</span><span>5 — Balanced</span><span>10 — Spectacle</span></div>
      <div class="sl-fb" id="boldFb">${BOLD_FB[boldVal]}</div>
    </div>`;
  }else if(q.type==='select'){
    h+='<div class="opts">';
    q.opts.forEach((o,j)=>{
      const s=ans[q.id]===j?' sel':'';
      h+=`<div class="opt${s}" onclick="pick('${q.id}',${j},this)">
        <div class="opt-ic">${o.ic}</div>
        <div class="opt-body"><div class="opt-t">${o.lbl}</div><div class="opt-d">${o.d}</div></div></div>`;
    });
    h+='</div>';
  }

  h+=`<div class="nav"><button class="btn-back" onclick="prev()">← Back</button><button class="btn-next" onclick="next()">Continue →</button></div></div>`;
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

function updateBold(v){
  boldVal=parseInt(v);ans['boldness']=boldVal;
  document.getElementById('boldFb').textContent=BOLD_FB[boldVal];
}

function pick(id,j,el){
  ans[id]=j;
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(()=>next(),650);
}

function next(){
  cur++;
  if(cur>=QS.length){
    if(window.parent&&window.parent.saveQuizData){
      window.parent.saveQuizData('layer2',{ans:JSON.parse(JSON.stringify(ans)),boldness:boldVal});
    }
    const c2=document.getElementById('content');c2.style.display='flex';c2.style.alignItems='center';c2.style.justifyContent='center';document.getElementById('prog').style.width='100%';
    document.getElementById('content').innerHTML=`
      <div class="sec-intro">
        
        <div class="sec-num">Layer II Complete</div>
        <div class="sec-title">Wealth Geography Mapped</div>
        <div class="sec-desc">The cold truth is recorded. The ice cracks — spring is coming. Next we measure your sacred capacity and what you\'re willing to alchemize.</div>
        <button class="btn-begin" onclick="window.parent.goTo(3)">Continue to Layer III →</button>
      </div>`;
    return;
  }
  renderQ(cur);
}
function prev(){if(cur<=0){cur=-1;renderIntro();return;}cur--;renderQ(cur);}

renderIntro();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guerrilla Wealth — Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#080610;--deep:#0e0b18;--smoke:#1a1528;--ridge:#2a2240;
  --copper:#d4863e;--ember:#e8a95b;--fire:#c45a3a;--gold:#f0c060;
  --jade:#3a9a7a;--jade-dim:#2a6a5a;--river:#4a9fa2;
  --cream:#f5f0e8;--warm:#faf7f2;--parch:#ede6da;--bone:#e0d8cc;
  --char:#35303d;--dim:#7a7288;--fog:#a89ab8;
  --glow:rgba(212,134,62,0.15);--glow2:rgba(212,134,62,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--void);color:var(--cream);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ═══ PARTICLES ═══ */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ AURORA ═══ */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 60%,rgba(212,134,62,0.08),transparent 50%),
    radial-gradient(ellipse 80% 40% at 15% 80%,rgba(74,63,140,0.3),transparent 50%),
    radial-gradient(ellipse 50% 40% at 85% 20%,rgba(58,154,122,0.1),transparent 50%);
  animation:auroraShift 22s ease-in-out infinite alternate;}
@keyframes auroraShift{0%{opacity:.8;filter:hue-rotate(0deg)}50%{opacity:1;filter:hue-rotate(8deg)}100%{opacity:.85;filter:hue-rotate(-5deg)}}

/* ═══ MOUNTAINS ═══ */
.mtn{position:fixed;bottom:0;left:0;width:100%;z-index:1;pointer-events:none;opacity:0.06;color:var(--cream);}
.mtn svg{width:100%;height:110px;display:block;}

/* ═══ SPLASH ═══ */
.sp{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:2;overflow:hidden;}
.sp-c{text-align:center;max-width:560px;padding:2rem;animation:rise 1.6s cubic-bezier(.16,1,.3,1);}
@keyframes rise{from{opacity:0;transform:translateY(60px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.orb-w{width:110px;height:110px;margin:0 auto 2.5rem;position:relative;}
.orb{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 38% 35%,#f0b865,var(--copper),#8a4a1a);box-shadow:0 0 60px rgba(212,134,62,.45),0 0 120px rgba(212,134,62,.15),inset 0 -6px 15px rgba(0,0,0,.35);animation:orbP 3.5s ease-in-out infinite;}
@keyframes orbP{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(212,134,62,.45),0 0 120px rgba(212,134,62,.15)}50%{transform:scale(1.04);box-shadow:0 0 80px rgba(212,134,62,.55),0 0 160px rgba(212,134,62,.22)}}
.orb-r{position:absolute;border:1px solid rgba(212,134,62,.15);border-radius:50%;animation:rP 3.5s ease-in-out infinite .5s;}
.orb-r:nth-child(2){inset:-14px;}
.orb-r:nth-child(3){inset:-30px;border-color:rgba(212,134,62,.07);animation-delay:1s;animation-duration:4s;}
.orb-r:nth-child(4){inset:-48px;border-color:rgba(212,134,62,.04);animation-delay:1.5s;animation-duration:4.5s;}
@keyframes rP{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.03)}}

.sp h1{font-family:'Cinzel',serif;font-size:clamp(2.4rem,7vw,3.8rem);letter-spacing:.02em;line-height:1.05;margin-bottom:.5rem;}
.sp .sub{display:block;font-family:'Space Mono',monospace;font-size:clamp(.55rem,1.3vw,.72rem);letter-spacing:.4em;text-transform:uppercase;color:var(--ember);margin-top:.9rem;}
.sp-desc{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-style:italic;color:#d0c8bc;margin:2rem auto 2.8rem;line-height:1.65;max-width:440px;}
.sp-desc strong{color:var(--ember);font-style:normal;font-weight:600;}

.btn{display:inline-block;padding:18px 52px;background:linear-gradient(135deg,var(--copper),var(--fire));color:var(--cream);border:none;border-radius:6px;font-family:'Space Mono',monospace;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all .35s;-webkit-tap-highlight-color:transparent;}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(212,134,62,.35);}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .6s;}
.btn:hover::after{left:100%;}
.btn:active{transform:scale(.97);}

.sp-nums{display:flex;justify-content:center;gap:3rem;margin-top:3.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.06);}
.sn-v{font-family:'Space Mono',monospace;font-size:1.4rem;color:var(--ember);}
.sn-l{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-top:.2rem;}

@media(max-width:600px){.sp-nums{gap:1.5rem;}}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="aurora"></div>
<div class="mtn"><svg viewBox="0 0 1440 120" preserveAspectRatio="none" fill="currentColor"><path d="M0,120 L0,92 C130,72 210,42 340,54 C470,66 540,84 660,56 C780,28 860,46 980,38 C1100,30 1180,54 1300,44 C1380,38 1420,48 1440,46 L1440,120Z"/></svg></div>

<div class="sp">
  <div class="sp-c">
    <div class="orb-w">
      <div class="orb"></div>
      <div class="orb-r"></div>
      <div class="orb-r"></div>
      <div class="orb-r"></div>
    </div>
    <h1>Guerrilla Wealth<span class="sub">Asheville Intelligence Engine</span></h1>
    <p class="sp-desc">The city is full of money, events, and doors that open if you know which ones to knock on. <strong>This tells you which doors, when, and what to say.</strong></p>
    <button class="btn" onclick="alert('→ Next slide: Quiz Layer I')">Begin Your Assessment →</button>
    <div class="sp-nums">
      <div><div class="sn-v">147</div><div class="sn-l">Venues Mapped</div></div>
      <div><div class="sn-v">12</div><div class="sn-l">Event Types</div></div>
      <div><div class="sn-v">$2.4M</div><div class="sn-l">Revenue Tracked</div></div>
    </div>
  </div>
</div>

<script>
// ═══ PARTICLE SYSTEM — 4 named types ═══
const cv=document.getElementById('particles'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);

const TYPES=[
  {name:'ember',count:12,color:'rgba(212,134,62,',sizeMin:1.5,sizeMax:3,speedY:-.3,speedX:.1,drift:'rise'},
  {name:'leaf',count:8,color:'rgba(58,154,122,',sizeMin:2,sizeMax:4,speedY:.15,speedX:.2,drift:'float'},
  {name:'mist',count:10,color:'rgba(120,80,160,',sizeMin:3,sizeMax:6,speedY:0,speedX:.08,drift:'wave'},
  {name:'spark',count:10,color:'rgba(240,192,96,',sizeMin:.8,sizeMax:1.5,speedY:-.5,speedX:.15,drift:'rise'}
];

let particles=[];

function spawnParticle(type){
  const s=type.sizeMin+Math.random()*(type.sizeMax-type.sizeMin);
  const a=.15+Math.random()*.35;
  return{
    x:Math.random()*W,
    y:type.drift==='rise'?H+Math.random()*100:Math.random()*H,
    s,a,
    vx:(Math.random()-.5)*type.speedX,
    vy:type.drift==='rise'?-(type.speedY+Math.random()*.3)*1.5:type.speedY+Math.random()*.1,
    color:type.color+a+')',
    type:type.name,
    phase:Math.random()*Math.PI*2,
    life:0
  };
}

TYPES.forEach(t=>{for(let i=0;i<t.count;i++)particles.push(spawnParticle(t));});

function animateParticles(){
  cx.clearRect(0,0,W,H);
  particles.forEach((p,i)=>{
    p.life+=.005;
    if(p.type==='wave'){
      p.x+=p.vx;
      p.y+=Math.sin(p.life*2+p.phase)*.3;
    }else{
      p.x+=p.vx+Math.sin(p.life*1.5+p.phase)*.2;
      p.y+=p.vy;
    }
    // Wrap
    if(p.y<-20){p.y=H+20;p.x=Math.random()*W;}
    if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
    if(p.x<-20)p.x=W+20;
    if(p.x>W+20)p.x=-20;

    cx.beginPath();
    cx.arc(p.x,p.y,p.s,0,Math.PI*2);
    cx.fillStyle=p.color;
    cx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guerrilla Wealth — Layer III: Sacred Capacity (Spring)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#080610;--deep:#0e0b18;--smoke:#1a1528;--ridge:#2a2240;
  --copper:#d4863e;--ember:#e8a95b;--fire:#c45a3a;--gold:#f0c060;
  --jade:#3a9a7a;--river:#4a9fa2;
  --cream:#f5f0e8;--dim:#7a7288;--fog:#a89ab8;
  --glow:rgba(212,134,62,0.15);
  /* Spring palette */
  --bloom:#c87aaa;--petal:#e8a0c8;--violet:#9a6aaa;--moss:#5a8a5a;
  --bud:#88bb88;--dawn:#e8c8d8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--void);color:var(--cream);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ SPRING AURORA — pink-green awakening ═══ */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 45% 65%,rgba(200,122,170,0.08),transparent 55%),
    radial-gradient(ellipse 50% 40% at 75% 25%,rgba(90,138,90,0.07),transparent 50%),
    radial-gradient(ellipse 70% 40% at 20% 50%,rgba(154,106,170,0.06),transparent 50%),
    radial-gradient(ellipse 40% 35% at 65% 75%,rgba(136,187,136,0.05),transparent 50%);
  animation:auroraShift 22s ease-in-out infinite alternate;}
@keyframes auroraShift{0%{opacity:.6;filter:hue-rotate(0deg)}50%{opacity:.95;filter:hue-rotate(5deg)}100%{opacity:.7;filter:hue-rotate(-3deg)}}

/* ═══ VIOLET-PINK MOON ═══ */
.moon{position:fixed;top:5vh;right:8vw;width:150px;height:150px;z-index:1;pointer-events:none;}
.moon-body{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 40% 36%,#e0a0d0,#c87aaa,#9a5a8a,#6a3a6a);
  box-shadow:
    0 0 50px rgba(200,122,170,0.35),
    0 0 100px rgba(200,122,170,0.18),
    0 0 200px rgba(154,106,170,0.1),
    inset -10px -6px 18px rgba(40,10,30,0.25);
  animation:moonGlow 5.5s ease-in-out infinite;
  position:relative;overflow:hidden;}
.moon-body::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(140deg,transparent 28%,rgba(255,200,240,0.3) 42%,transparent 52%,rgba(220,160,200,0.15) 68%,transparent 78%);
  animation:moonShimmer 9s ease-in-out infinite;}
.moon-body::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 58% 52%,transparent 38%,rgba(100,50,80,0.12) 58%,rgba(60,25,50,0.08) 78%);}
.moon-halo{position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(200,122,170,0.1);animation:ringFloat 6.5s ease-in-out infinite;}
.moon-halo2{position:absolute;inset:-42px;border-radius:50%;border:1px solid rgba(200,122,170,0.05);animation:ringFloat 8.5s ease-in-out infinite 1.2s;}
@keyframes moonGlow{0%,100%{box-shadow:0 0 50px rgba(200,122,170,0.35),0 0 100px rgba(200,122,170,0.18),0 0 200px rgba(154,106,170,0.1),inset -10px -6px 18px rgba(40,10,30,0.25)}50%{box-shadow:0 0 70px rgba(200,122,170,0.45),0 0 140px rgba(200,122,170,0.28),0 0 240px rgba(154,106,170,0.15),inset -10px -6px 18px rgba(40,10,30,0.2)}}
@keyframes moonShimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes ringFloat{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.55;transform:scale(1.02)}}

.mtn{position:fixed;bottom:0;left:0;width:100%;z-index:1;pointer-events:none;opacity:0.06;color:var(--bud);}
.mtn svg{width:100%;height:110px;display:block;}

.sea{position:fixed;bottom:1rem;right:1rem;font-family:'Inter',system-ui,sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bloom);opacity:.3;z-index:50;pointer-events:none;}

.prog{position:fixed;top:0;left:0;width:100%;height:4px;z-index:200;background:rgba(255,255,255,.06);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--bloom),var(--petal));transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0;}

.content{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;}

.sec-intro{max-width:600px;margin:0 auto;padding:4rem 2rem 3rem;text-align:center;animation:fadeUp .8s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.sec-icon{font-size:2.8rem;margin-bottom:1rem;filter:drop-shadow(0 0 12px rgba(200,122,170,.3));}
.sec-num{font-family:'Inter',system-ui,sans-serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--bloom);margin-bottom:.5rem;}
.sec-title{font-family:'Inter',system-ui,sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);margin-bottom:.6rem;}
.sec-desc{font-family:'Inter',system-ui,sans-serif;font-size:1.1rem;font-weight:400;color:var(--fog);line-height:1.65;margin-bottom:2rem;max-width:480px;margin-left:auto;margin-right:auto;}

.qc{max-width:640px;margin:0 auto;padding:2rem 1.5rem 4rem;display:none;}
.qc.on{display:block;animation:fadeUp .5s ease-out;}
.qc-ct{font-family:'Inter',system-ui,sans-serif;font-size:.75rem;letter-spacing:.12em;color:#c0b8c8;margin-bottom:1.2rem;text-align:center;}
.qc-t{font-family:'Inter',system-ui,sans-serif;font-size:clamp(1.4rem,4.5vw,1.9rem);font-weight:700;text-align:center;line-height:1.3;margin-bottom:.6rem;letter-spacing:-.02em;}
.qc-sub{font-family:'Inter',system-ui,sans-serif;font-size:1.1rem;font-weight:400;color:#d0c8d8;text-align:center;margin-bottom:2rem;line-height:1.55;}

.opts{display:flex;flex-direction:column;gap:.6rem;}
.opt{padding:1.1rem 1.3rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:10px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(8px);display:flex;align-items:flex-start;gap:.9rem;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.opt::before{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transition:left .6s;pointer-events:none;}
.opt:hover{border-color:rgba(200,122,170,.3);background:rgba(200,122,170,.05);transform:translateX(6px);}
.opt:hover::before{left:100%;}
.opt.sel{border-color:rgba(200,122,170,.5);background:rgba(200,122,170,.08);box-shadow:0 0 20px rgba(200,122,170,.06);}
/* Multi-select checkmark */
.opt.sel::after{content:'✓';position:absolute;top:.9rem;right:1rem;color:var(--bloom);font-size:.9rem;}
.opt-ic{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;margin-top:.05rem;transition:all .3s;}
.opt.sel .opt-ic{background:rgba(200,122,170,.15);}
.opt-body{flex:1;}
.opt-t{font-family:'Inter',system-ui,sans-serif;font-weight:600;font-size:1.1rem;}
.opt-d{font-family:'Inter',system-ui,sans-serif;font-size:1rem;color:#d0c8d8;margin-top:.25rem;line-height:1.5;}

.q-ta{width:100%;padding:1.1rem;background:rgba(255,255,255,.14);border:1px solid rgba(200,122,170,.12);border-radius:8px;color:var(--cream);font-family:'Inter',system-ui,sans-serif;font-size:1.1rem;outline:none;resize:none;transition:border-color .3s;min-height:90px;}
.q-ta:focus{border-color:rgba(200,122,170,.35);box-shadow:0 0 15px rgba(200,122,170,.06);}
.q-ta::placeholder{color:#b0a8b8;font-style:italic;}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2.5rem;padding:0 .5rem;}
.btn-back{background:none;border:none;color:#b0a8b8;font-family:'Inter',system-ui,sans-serif;font-size:.75rem;cursor:pointer;letter-spacing:.06em;transition:color .2s;-webkit-tap-highlight-color:transparent;}
.btn-back:hover{color:var(--cream);}
.btn-next{padding:12px 32px;background:rgba(200,122,170,.12);border:1px solid rgba(200,122,170,.25);color:var(--petal);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent;}
.btn-next:hover{background:rgba(200,122,170,.22);transform:translateY(-2px);}
.btn-begin{padding:14px 40px;background:rgba(200,122,170,.12);border:1px solid rgba(200,122,170,.25);color:var(--petal);border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent;}
.btn-begin:hover{background:rgba(200,122,170,.22);transform:translateY(-2px);}

@media(max-width:600px){.opts{gap:.5rem;}.opt{padding:.9rem 1rem;}.moon{width:100px;height:100px;top:3vh;right:5vw;}}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="aurora"></div>

<!-- ═══ VIOLET-PINK MOON ═══ -->
<div class="moon">
  <div class="moon-body"></div>
  <div class="moon-halo"></div>
  <div class="moon-halo2"></div>
</div>

<div class="mtn"><svg viewBox="0 0 1440 120" preserveAspectRatio="none" fill="currentColor"><path d="M0,120 L0,88 C160,68 240,38 380,50 C520,62 580,80 700,52 C820,24 900,42 1020,36 C1140,30 1220,50 1340,40 C1400,35 1430,42 1440,40 L1440,120Z"/></svg></div>
<div class="sea">✦ spring · layer iii</div>
<div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>

<div class="content" id="content"></div>

<script>
// ═══ SPRING PARTICLES — cherry blossom petals + pollen + fireflies ═══
const cv=document.getElementById('particles'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);

const PETAL_COLORS=['#e8a0c8','#f0b8d0','#d888b0','#c878a0','#eec0d8','#f0d0e0'];

function drawPetal(x,y,size,rot,color,alpha){
  cx.save();
  cx.translate(x,y);
  cx.rotate(rot);
  cx.globalAlpha=alpha;
  cx.fillStyle=color;
  cx.beginPath();
  cx.ellipse(0,0,size*.4,size,0,0,Math.PI*2);
  cx.fill();
  // Petal highlight
  cx.globalAlpha=alpha*.3;
  cx.fillStyle='#fff';
  cx.beginPath();
  cx.ellipse(-size*.1,-size*.3,size*.15,size*.4,-.2,0,Math.PI*2);
  cx.fill();
  cx.restore();
}

let particles=[];

// Cherry blossom petals (55)
for(let i=0;i<55;i++){
  particles.push({
    type:'petal',x:Math.random()*3000,y:-30-Math.random()*600,
    size:3+Math.random()*6,rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-.5)*.03,
    vx:(Math.random()-.5)*.4,vy:.2+Math.random()*.4,
    drift:Math.random()*Math.PI*2,driftSpeed:.005+Math.random()*.01,
    color:PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)],
    alpha:.15+Math.random()*.4
  });
}

// Pollen / light motes (20)
for(let i=0;i<20;i++){
  particles.push({
    type:'pollen',x:Math.random()*3000,y:Math.random()*3000,
    size:.8+Math.random()*1.8,
    vx:(Math.random()-.5)*.15,vy:-(0.05+Math.random()*.15),
    phase:Math.random()*Math.PI*2,
    alpha:.1+Math.random()*.25
  });
}

// Soft green mist
for(let i=0;i<6;i++){
  particles.push({
    type:'mist',x:Math.random()*3000,y:Math.random()*3000,
    size:5+Math.random()*7,vx:.03+Math.random()*.05,
    phase:Math.random()*Math.PI*2,
    alpha:.04+Math.random()*.08,life:0
  });
}

function animate(){
  cx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    if(p.type==='petal'){
      p.drift+=p.driftSpeed;
      p.x+=p.vx+Math.sin(p.drift)*.6;
      p.y+=p.vy;p.rot+=p.rotSpeed;
      if(p.y>H+40){p.y=-40-Math.random()*100;p.x=Math.random()*W;}
      if(p.x<-40)p.x=W+40;if(p.x>W+40)p.x=-40;
      drawPetal(p.x,p.y,p.size,p.rot,p.color,p.alpha);
    }else if(p.type==='pollen'){
      p.phase+=.015;
      p.x+=p.vx+Math.sin(p.phase)*.2;
      p.y+=p.vy+Math.cos(p.phase*.7)*.1;
      if(p.y<-20){p.y=H+20;p.x=Math.random()*W;}
      if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
      cx.globalAlpha=p.alpha*(0.6+Math.sin(p.phase*3)*.4);
      cx.fillStyle='#e8d8a0';
      cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
      cx.globalAlpha=p.alpha*.12;
      cx.beginPath();cx.arc(p.x,p.y,p.size*3,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }else if(p.type==='mist'){
      p.life+=.002;
      p.x+=p.vx;p.y+=Math.sin(p.life*1.5+p.phase)*.25;
      if(p.x>W+40){p.x=-40;p.y=Math.random()*H;}
      cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);
      cx.fillStyle='rgba(90,138,90,'+p.alpha+')';cx.fill();
    }
  });
  requestAnimationFrame(animate);
}
animate();

// ═══ QUIZ ENGINE ═══
const QS=[
  {id:'hours',ct:'LAYER III · QUESTION 1 OF 4',
   t:'How many hours a week can you give this?',
   sub:'Not aspirational. Real. After the kids, the job, the exhaustion — what\'s left?',
   type:'select',
   opts:[
     {ic:'🕐',lbl:'2–5 hours',d:'Tight. Every minute counts — stealth mode.',multi:false},
     {ic:'🕑',lbl:'5–10 hours',d:'Working margin. Enough to build real traction.',multi:false},
     {ic:'🕒',lbl:'10–20 hours',d:'Part-time serious. Can run full campaigns.',multi:false},
     {ic:'🕓',lbl:'20–30 hours',d:'This is your business. Active operation mode.',multi:false},
     {ic:'🕔',lbl:'30+ hours',d:'Full-time. Scaling engine. Let\'s go.',multi:false}
   ]},
  {id:'offerings',ct:'LAYER III · QUESTION 2 OF 4',
   t:'What do you sell? Select all that apply.',
   sub:'Everything you offer, even the thing you don\'t charge enough for yet.',
   type:'multi',
   opts:[
     {ic:'🔮',lbl:'Readings / Divination',d:'Tarot, oracle, astrology, psychic'},
     {ic:'📋',lbl:'Reports / Written Products',d:'Heritage reports, assessments, analyses'},
     {ic:'🎓',lbl:'Courses / Workshops',d:'Online or in-person teaching'},
     {ic:'🤝',lbl:'1-on-1 Sessions',d:'Coaching, consulting, healing'},
     {ic:'📦',lbl:'Physical Products',d:'Handmade goods, merch, kits'},
     {ic:'💻',lbl:'Digital Products',d:'Templates, guides, downloads'},
     {ic:'🏛️',lbl:'Events / Retreats',d:'Gatherings you host or co-create'}
   ]},
  {id:'hook',ct:'LAYER III · QUESTION 3 OF 4',
   t:'What\'s your free hook — the thing that gets them in the door?',
   sub:'The lead magnet. The first taste. What do you give away that makes them come back?',
   type:'select',
   opts:[
     {ic:'✨',lbl:'Free mini-reading / sample session',d:'They feel the magic and want more'},
     {ic:'📄',lbl:'Free guide / PDF / resource',d:'Value document that builds trust'},
     {ic:'🎬',lbl:'Free video / content series',d:'They binge you before they buy'},
     {ic:'💬',lbl:'Free consultation / discovery call',d:'Conversation converts to client'},
     {ic:'🎁',lbl:'I don\'t have one yet',d:'We\'ll build this together — it\'s the most important piece'}
   ]},
  {id:'avoid',ct:'LAYER III · QUESTION 4 OF 4',
   t:'What do you secretly avoid?',
   sub:'The avoidance IS the strategy gap. This answer is worth more than everything else combined.',
   type:'text',placeholder:'The thing you know you should be doing but keep not doing...'}
];

let cur=-1;const ans={};

function renderIntro(){
  const c=document.getElementById('content');
  c.style.display='flex';c.style.alignItems='center';c.style.justifyContent='center';
  c.innerHTML=`
    <div class="sec-intro">
      
      <div class="sec-num">Layer III of III</div>
      <div class="sec-title">Sacred Capacity & Money Alchemy</div>
      <div class="sec-desc">The ice is breaking. Spring measures what\'s ready to bloom — your time, your offerings, your hooks, and the one thing you keep avoiding that holds the key to everything.</div>
      <button class="btn-begin" onclick="next()">Measure What Blooms →</button>
    </div>`;
  document.getElementById('prog').style.width='0%';
}

function renderQ(i){
  const c=document.getElementById('content');
  c.style.display='block';c.style.alignItems='';c.style.justifyContent='';
  const q=QS[i];
  document.getElementById('prog').style.width=Math.round(((i+1)/QS.length)*100)+'%';
  let h=`<div class="qc on"><div class="qc-ct">${q.ct}</div><div class="qc-t">${q.t}</div><div class="qc-sub">${q.sub}</div>`;

  if(q.type==='text'){
    const v=ans[q.id]||'';
    h+=`<textarea class="q-ta" placeholder="${q.placeholder}" oninput="ans['${q.id}']=this.value" rows="4">${v}</textarea>`;
  }else{
    h+='<div class="opts">';
    q.opts.forEach((o,j)=>{
      let s='';
      if(q.type==='multi'){
        if(ans[q.id]&&ans[q.id].includes(j))s=' sel';
      }else{
        if(ans[q.id]===j)s=' sel';
      }
      h+=`<div class="opt${s}" onclick="${q.type==='multi'?`multiPick('${q.id}',${j},this)`:`pick('${q.id}',${j},this)`}">
        <div class="opt-ic">${o.ic}</div>
        <div class="opt-body"><div class="opt-t">${o.lbl}</div><div class="opt-d">${o.d}</div></div></div>`;
    });
    h+='</div>';
  }

  h+=`<div class="nav"><button class="btn-back" onclick="prev()">← Back</button><button class="btn-next" onclick="next()">Continue →</button></div></div>`;
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

function pick(id,j,el){
  ans[id]=j;
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(()=>next(),650);
}

function multiPick(id,j,el){
  if(!ans[id])ans[id]=[];
  const idx=ans[id].indexOf(j);
  if(idx>-1){ans[id].splice(idx,1);el.classList.remove('sel');}
  else{ans[id].push(j);el.classList.add('sel');}
}

function next(){
  cur++;
  if(cur>=QS.length){
    if(window.parent&&window.parent.saveQuizData){
      window.parent.saveQuizData('layer3',JSON.parse(JSON.stringify(ans)));
    }
    const c2=document.getElementById('content');c2.style.display='flex';c2.style.alignItems='center';c2.style.justifyContent='center';document.getElementById('prog').style.width='100%';
    document.getElementById('content').innerHTML=`
      <div class="sec-intro">
        
        <div class="sec-num">All Layers Complete</div>
        <div class="sec-title">The Assessment Is Finished</div>
        <div class="sec-desc">Spring has mapped everything that\'s ready to bloom. Summer comes next — the generating engine, where your archetype is revealed and your intelligence map is built.</div>
        <button class="btn-begin" onclick="window.parent.goTo(4)">Generate Your Map →</button>
      </div>`;
    return;
  }
  renderQ(cur);
}
function prev(){if(cur<=0){cur=-1;renderIntro();return;}cur--;renderQ(cur);}

renderIntro();
</script>
</body>
</html>
